<!DOCTYPE html>
<html>
<head>
    <title>Credit Risk Scoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="logout-link">Logged in as {{ current_user.username }} — <a href="/logout">Log out</a></div>
        <h1>Credit Risk Assessment</h1>
        <p style="text-align:right;"><a href="/dashboard">View Dashboard →</a></p>
        <form action="/predict" method="post">
            <label>Age</label>
            <input type="number" name="age" required>

            <label>Monthly Income</label>
            <input type="number" step="0.01" name="monthly_income" required>

            <label>Number of Dependents</label>
            <input type="number" name="dependents" value="0" required>

            <label>Debt Ratio</label>
            <input type="number" step="0.0001" name="debt_ratio" required>

            <label>Times 30-59 Days Past Due</label>
            <input type="number" name="late_30_59" value="0" required>

            <label>Times 60-89 Days Past Due</label>
            <input type="number" name="late_60_89" value="0" required>

            <label>Times 90+ Days Late</label>
            <input type="number" name="late_90" value="0" required>

            <button type="submit">Assess Risk</button>
        </form>
    </div>
</body>
</html>
