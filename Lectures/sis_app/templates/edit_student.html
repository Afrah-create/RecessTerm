{% extends "base.html" %}

{% block title %}Edit Student - Student Information System{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='edit_student.css') }}">
{% endblock %}

{% block content %}
<section class="edit-student-page">

    <div class="edit-student-card">

        <div class="card-header">
            <h2>Edit Student Information</h2>
            <p>Update the student's details below and save your changes.</p>
        </div>

        <form method="POST" action="{{ url_for('edit_student', student_id=student.id) }}">

            <div class="form-body">

                <div class="form-group">
                    <label for="student_name">Student Name</label>
                    <input
                        type="text"
                        id="student_name"
                        name="student_name"
                        value="{{ student.student_name }}"
                        required>
                </div>

                <div class="form-group">
                    <label for="registration_number">Registration Number</label>
                    <input
                        type="text"
                        id="registration_number"
                        name="registration_number"
                        value="{{ student.registration_number }}"
                        required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        value="{{ student.email }}"
                        required>
                </div>

                <div class="form-group">
                    <label for="programme">Programme</label>
                    <input
                        type="text"
                        id="programme"
                        name="programme"
                        value="{{ student.programme }}"
                        required>
                </div>

            </div>

            <div class="form-actions">
                <a href="{{ url_for('students_list') }}" class="btn btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    Update Student
                </button>
            </div>

        </form>

    </div>

</section>
{% endblock %}
