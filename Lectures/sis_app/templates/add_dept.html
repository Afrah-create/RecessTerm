{% extends "base.html" %}

{% block title %}Add department - Student Information System{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
{% endblock %}

{% block content %}
    <section class="register-page">
        <h2>Add Dept Form</h2>
        <div class="form-container">
            <form method="POST" action="{{ url_for('adddept') }}" class="registration-form">
                <div class="form-group">
                    <label for="department_name">department Name *</label>
                    <input type="text" id="department_name" name="dept_name" 
                           placeholder="Enter department name" required>
                </div>

                <div class="form-group">
                    <label for="department_code">Department Code *</label>
                    <input type="text" id="department_code" name="dept_code" 
                           placeholder="e.g., BSSE2207" required>
                </div>

             


                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Add department</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
