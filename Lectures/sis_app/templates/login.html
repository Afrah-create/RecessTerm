{% extends "base.html" %}

{% block title %}Login - Student Information System{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
{% endblock %}

{% block content %}
    <section class="register-page">
        <h2>Sign In</h2>
        <div class="form-container">
            <div class="form-header">
                <h2>Welcome back</h2>
                <p>Use your account credentials to continue.</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="registration-form">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Login</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>
            </form>

            <p style="margin-top: 1rem; color: var(--color-muted); text-align: center;">
                Need an account? <a href="{{ url_for('register') }}">Create one here</a>.
            </p>
        </div>
    </section>
{% endblock %}
