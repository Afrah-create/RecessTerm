{% extends "base.html" %}

{% block title %}Edit Course - Student Information System{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='edit_course.css') }}">
{% endblock %}

{% block content %}

<section class="edit-course-page">

    <div class="edit-course-card">

        <div class="card-header">
            <h2>Edit Course Information</h2>
            <p>Update the course details below and save your changes.</p>
        </div>

        <form method="POST" action="{{ url_for('edit_course_route', course_id=course.id) }}">

            <div class="form-body">

                <div class="form-group">
                    <label for="course_name">Course Name</label>
                    <input
                        type="text"
                        id="course_name"
                        name="course_name"
                        value="{{ course.course_name }}"
                        placeholder="Enter course name"
                        autocomplete="off"
                        required>
                </div>

                <div class="form-group">
                    <label for="course_code">Course Code</label>
                    <input
                        type="text"
                        id="course_code"
                        name="course_code"
                        value="{{ course.course_code }}"
                        placeholder="Enter course code"
                        autocomplete="off"
                        required>
                </div>

                <div class="form-group">
                    <label for="course_weight">Course Weight</label>
                    <input
                        type="number"
                        id="course_weight"
                        name="course_weight"
                        value="{{ course.course_weight }}"
                        placeholder="Enter course weight"
                        min="1"
                        required>
                </div>

            </div>

            <div class="form-actions">
                <a href="{{ url_for('course_list') }}" class="btn btn-secondary">
                    Cancel
                </a>

                <button type="submit" class="btn btn-primary">
                    Update Course
                </button>
            </div>

        </form>

    </div>

</section>

{% endblock %}
