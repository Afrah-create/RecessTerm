{% extends "base.html" %}

{% block title %}Create Account - Student Information System{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
{% endblock %}

{% block content %}
    <section class="register-page">
        <h2>Create an Account</h2>
        <div class="form-container">
            <div class="form-header">
                <h2>Join the SIS</h2>
                <p>Create an account to manage records and log in securely.</p>
            </div>

            <form method="POST" action="{{ url_for('register') }}" class="registration-form">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Account</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>
            </form>

            <p style="margin-top: 1rem; color: var(--color-muted); text-align: center;">
                Already have an account? <a href="{{ url_for('login') }}">Log in</a>.
            </p>
        </div>
    </section>
{% endblock %}
